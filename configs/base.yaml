seed: 42

paths:
  data_root: "data"
  plantvillage_dir: "src/data/PlantVillage_processed"
  plantdoc_dir: "src/data/PlantDoc-Dataset"
  outputs_dir: "outputs"
  checkpoints_dir: "outputs/checkpoints"
  metrics_dir: "outputs/metrics"
  figures_dir: "outputs/figures"
  predictions_dir: "outputs/predictions"
  gradcam_dir: "outputs/gradcam"
  logs_dir: "outputs/logs"

training:
  epochs: 10
  batch_size: 32
  learning_rate: 1.0e-4
  weight_decay: 1.0e-5
  early_stopping_patience: 5
  mixed_precision: true
  num_workers: 4
  pin_memory: true
  scheduler:
    name: ReduceLROnPlateau
    mode: max          # monitor val accuracy
    factor: 0.5
    patience: 2
    min_lr: 1.0e-7

augmentation:
  train:
    random_rotation: 20
    horizontal_flip: true
    vertical_flip: true
    random_affine:
      degrees: 10
      translate: [0.1, 0.1]
      scale: [0.9, 1.1]
    color_jitter:
      brightness: 0.3
      contrast: 0.3
      saturation: 0.3
      hue: 0.1
    random_perspective:
      distortion_scale: 0.2
      p: 0.3
    gaussian_blur:
      kernel_size: 3
      p: 0.2
    random_resized_crop:
      scale: [0.8, 1.0]
  val_test:
    resize: 256
    center_crop: 224

normalization:
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

classes:
  plantvillage:
    - "Pepper__bell___Bacterial_spot"
    - "Pepper__bell___healthy"
    - "Potato___Early_blight"
    - "Potato___Late_blight"
    - "Potato___healthy"
    - "Tomato___Bacterial_spot"
    - "Tomato___Early_blight"
    - "Tomato___Late_blight"
    - "Tomato___Leaf_Mold"
    - "Tomato___Septoria_leaf_spot"
    - "Tomato___Spider_mites Two-spotted_spider_mite"
    - "Tomato___Target_Spot"
    - "Tomato___Tomato_Yellow_Leaf_Curl_Virus"
    - "Tomato___Tomato_mosaic_virus"
    - "Tomato___healthy"
  num_classes: 15

# PlantDoc folder names → PlantVillage canonical class index
# Only PlantDoc classes that have a matching PlantVillage class are kept.
class_mapping:
  "Pepper__bell___Bacterial_spot": 0
  "Pepper__bell___healthy": 1
  "Potato___Early_blight": 2
  "Potato___Late_blight": 3
  "Potato___healthy": 4
  "Tomato___Bacterial_spot": 5
  "Tomato___Early_blight": 6
  "Tomato___Late_blight": 7
  "Tomato___Leaf_Mold": 8
  "Tomato___Septoria_leaf_spot": 9
  "Tomato___Spider_mites Two-spotted_spider_mite": 10
  "Tomato___Target_Spot": 11
  "Tomato___Tomato_Yellow_Leaf_Curl_Virus": 12
  "Tomato___Tomato_mosaic_virus": 13
  "Tomato___healthy": 14
